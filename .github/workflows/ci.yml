name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build docker image
        run: |
          docker build -t backup-pg2minio:latest .
          docker tag backup-pg2minio:latest anhnmt/backup-pg2minio:latest

      - name: Start services
        run: docker compose -f docker-compose.test.yml up -d postgres minio

      - name: Wait for PostgreSQL
        run: |
          timeout 60 bash -c 'until docker exec test_postgres pg_isready -U postgres; do sleep 1; done'
          echo "PostgreSQL ready"

      - name: Wait for MinIO
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'
          echo "MinIO ready"

      - name: Configure MinIO bucket
        run: |
          docker exec test_minio mc alias set local http://localhost:9000 12345678 12345678
          docker exec test_minio mc mb --ignore-existing local/testbucket

      - name: Build binary
        run: go build -o backup-pg2minio .

      - name: Run backup
        run: docker compose -f docker-compose.test.yml run --rm pg2minio

      - name: Verify backup in MinIO
        run: |
          echo "=== Raw mc ls output ==="
          docker exec test_minio mc ls --recursive local/testbucket/

          # $NF từ mc ls --recursive là object key kể cả subfolder, không có bucket name
          # Ví dụ: "exampledb/exampledb_2026-03-29T12-00-00.custom.gz"
          # hoặc flat: "exampledb_2026-03-29T12-00-00.custom.gz"
          OBJECT_KEY=$(docker exec test_minio mc ls --recursive local/testbucket/ \
            | grep "custom.gz" | head -1 | awk '{print $NF}')

          if [ -z "$OBJECT_KEY" ]; then
            echo "ERROR: No backup file found in bucket"
            exit 1
          fi
          echo "Object key in MinIO: $OBJECT_KEY"

          FILE_SIZE=$(docker exec test_minio mc stat "local/testbucket/$OBJECT_KEY" \
            | grep -i "Size" | awk '{print $2}')
          echo "File size: $FILE_SIZE bytes"
          if [ -z "$FILE_SIZE" ] || [ "$FILE_SIZE" = "0" ]; then
            echo "ERROR: Backup file is empty"
            exit 1
          fi

          echo "Backup verified: $OBJECT_KEY ($FILE_SIZE bytes)"
          # Truyền đúng object key vào restore (không có bucket prefix)
          echo "BACKUP_FILE=$OBJECT_KEY" >> $GITHUB_ENV

      - name: Run restore
        run: |
          echo "Restoring from object key: $BACKUP_FILE"
          docker compose -f docker-compose.test.yml run --rm \
            -e RESTORE_SOURCE_PATH="$BACKUP_FILE" \
            restore_test

      - name: Verify restore
        run: |
          docker logs test_restore 2>&1 | grep -i "restore completed successfully" \
            && echo "Restore verified successfully" \
            || { echo "WARNING: success message not found in logs"; docker logs test_restore 2>&1; }

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v