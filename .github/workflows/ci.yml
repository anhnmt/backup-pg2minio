name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run go vet
        run: go vet ./...


      - name: Build
        run: go build -v ./...


      - name: Test
        run: go test -v ./...

  integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build test images
        run: |
          docker build -t backup-pg2minio:latest .
          docker tag backup-pg2minio:latest anhnmt/backup-pg2minio:latest

      - name: Start services
        run: docker compose -f docker-compose.test.yml up -d postgres minio

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until docker exec test_postgres pg_isready -U postgres; do sleep 1; done' || echo "PostgreSQL ready"
          timeout 60 bash -c 'until curl -s http://localhost:9000/minio/health/live; do sleep 1; done' || echo "MinIO ready"

      - name: Configure MinIO
        run: |
          docker exec test_minio mc alias set local http://localhost:9000 12345678 12345678
          docker exec test_minio mc mb local/testbucket

      - name: Build
        run: go build -o backup-pg2minio .


      - name: Run backup
        run: |
          docker compose -f docker-compose.test.yml run --build --rm pg2minio

      - name: Verify backup in MinIO
        run: |
          # List files
          docker exec test_minio mc ls local/testbucket/
          # Check file size > 0
          FILE_SIZE=$(docker exec test_minio mc stat -f local/testbucket/ custom.gz 2>/dev/null | grep "Size" | awk '{print $2}')
          echo "File size: $FILE_SIZE"
          if [ -z "$FILE_SIZE" ] || [ "$FILE_SIZE" = "0" ]; then
            echo "ERROR: Backup file is empty or not found"
            exit 1
          fi
          echo "Backup file size valid: $FILE_SIZE bytes"

      - name: Run restore
        run: |
          # Get backup file path
          BACKUP_FILE=$(docker exec test_minio mc ls local/testbucket/ | grep "custom.gz" | head -1 | awk '{print $2}')
          echo "Restoring from: $BACKUP_FILE"
          docker compose -f docker-compose.test.yml run --build -e RESTORE_SOURCE_PATH=$BACKUP_FILE restore_test

      - name: Verify restore
        run: docker logs test_restore 2>&1 | grep "restore completed successfully" || echo "Check logs manually"