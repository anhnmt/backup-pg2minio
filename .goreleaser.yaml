version: 2

env:
  - GO111MODULE=on

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64

checksum:
  algorithm: sha256
  name_template: "checksums.txt"

dockers:
  - image_templates:
      - "anhnmt/backup-pg2minio:latest"
      - "anhnmt/backup-pg2minio:{{ .Tag }}"
    dockerfile: ./Dockerfile
    goos: linux
    goarch: amd64
    extra_files:
      - ./

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy