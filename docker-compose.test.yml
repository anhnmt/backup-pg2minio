services:
  postgres:
    image: postgres:18-alpine
    container_name: test_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: exampledb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: test_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: 12345678
      MINIO_ROOT_PASSWORD: 12345678
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg2minio:
    image: anhnmt/backup-pg2minio:latest
    container_name: test_pg2minio
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ACTION: backup
      SCHEDULE: ""
      MINIO_ACCESS_KEY: 12345678
      MINIO_SECRET_KEY: 12345678
      MINIO_BUCKET: testbucket
      MINIO_SERVER: http://127.0.0.1:9000
      MINIO_API_VERSION: S3v4
      POSTGRES_DATABASE: exampledb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_FORMAT: custom
      POSTGRES_EXTRA_OPTS: "--jobs=2"

  restore_test:
    image: anhnmt/backup-pg2minio:latest
    container_name: test_restore
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ACTION: restore
      MINIO_ACCESS_KEY: 12345678
      MINIO_SECRET_KEY: 12345678
      MINIO_BUCKET: testbucket
      MINIO_SERVER: http://127.0.0.1:9000
      MINIO_API_VERSION: S3v4
      POSTGRES_DATABASE: exampledb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      RESTORE_SOURCE_PATH: exampledb_2026-03-29T12-00-00.custom.gz
      RESTORE_TARGET_DB: exampledb_restore

volumes:
  postgres_data:
  minio_data: